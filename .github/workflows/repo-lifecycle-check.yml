name: Repo Lifecycle Check

on:
  schedule:
    - cron: '0 9 1 * *'  # 9am UTC on the 1st of every month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check repo activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STALE_DAYS=180   # 6 months
          WARN_DAYS=90     # 3 months warning
          TODAY=$(date +%s)
          ORG="hazeltime"

          echo "## Repo Activity Report — $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | Last Push | Days Inactive | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|---------------|--------|" >> $GITHUB_STEP_SUMMARY

          STALE_REPOS=()
          WARN_REPOS=()

          # Get all non-archived, non-fork repos
          REPOS=$(gh api /orgs/$ORG/repos --paginate --jq '.[] | select(.archived == false and .fork == false) | [.name, .pushed_at] | @tsv')

          while IFS=$'\t' read -r name pushed_at; do
            PUSHED=$(date -d "$pushed_at" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$pushed_at" +%s 2>/dev/null || echo "0")
            AGE_DAYS=$(( (TODAY - PUSHED) / 86400 ))

            if [ "$AGE_DAYS" -gt "$STALE_DAYS" ]; then
              STATUS="🔴 STALE"
              STALE_REPOS+=("$name|$AGE_DAYS|$pushed_at")
            elif [ "$AGE_DAYS" -gt "$WARN_DAYS" ]; then
              STATUS="🟡 WARNING"
              WARN_REPOS+=("$name|$AGE_DAYS|$pushed_at")
            else
              STATUS="✅ Active"
            fi

            echo "| $name | ${pushed_at:0:10} | $AGE_DAYS | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done <<< "$REPOS"

          if [ ${#STALE_REPOS[@]} -eq 0 ] && [ ${#WARN_REPOS[@]} -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All repos are active. No action needed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Build issue body
          BODY="## 🗂️ Repo Lifecycle Review — $(date +%Y-%m)\n\n"

          if [ ${#STALE_REPOS[@]} -gt 0 ]; then
            BODY+="### 🔴 Stale (>${STALE_DAYS} days inactive) — Consider archiving\n\n"
            BODY+="| Repo | Days Inactive | Last Push |\n|------|---------------|----------|\n"
            for entry in "${STALE_REPOS[@]}"; do
              IFS='|' read -r rname rage rpushed <<< "$entry"
              BODY+="| [\`$rname\`](https://github.com/$ORG/$rname) | $rage | ${rpushed:0:10} |\n"
            done
            BODY+="\n"
          fi

          if [ ${#WARN_REPOS[@]} -gt 0 ]; then
            BODY+="### 🟡 Warning (>${WARN_DAYS} days inactive) — Monitor\n\n"
            BODY+="| Repo | Days Inactive | Last Push |\n|------|---------------|----------|\n"
            for entry in "${WARN_REPOS[@]}"; do
              IFS='|' read -r rname rage rpushed <<< "$entry"
              BODY+="| [\`$rname\`](https://github.com/$ORG/$rname) | $rage | ${rpushed:0:10} |\n"
            done
            BODY+="\n"
          fi

          BODY+="### Actions\n- Archive stale repos: \`gh api -X PATCH /repos/$ORG/{repo} --field archived=true\`\n- Mark as active: update the \`active\` custom property\n\n> Auto-generated by Repo Lifecycle Check workflow."

          # Check for existing open lifecycle issue
          EXISTING=$(gh issue list --repo $ORG/.github --state open --search "Repo Lifecycle Review" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo $ORG/.github \
              --title "🗂️ Repo Lifecycle Review — $(date +%Y-%m)" \
              --body "$(printf '%b' "$BODY")"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create \
              --repo $ORG/.github \
              --title "🗂️ Repo Lifecycle Review — $(date +%Y-%m)" \
              --body "$(printf '%b' "$BODY")" \
              --label "maintenance" \
              || gh issue create \
                --repo $ORG/.github \
                --title "🗂️ Repo Lifecycle Review — $(date +%Y-%m)" \
                --body "$(printf '%b' "$BODY")"
          fi