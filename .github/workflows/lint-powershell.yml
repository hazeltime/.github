name: Lint PowerShell (Reusable)

on:
  workflow_call:
    inputs:
      path:
        description: 'Path to scan for PowerShell files'
        type: string
        default: '.'
      recurse:
        description: 'Recursively scan subdirectories'
        type: boolean
        default: true
      severity:
        description: 'Minimum severity to report (Information, Warning, Error)'
        type: string
        default: 'Warning'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          
          $params = @{
            Path     = '${{ inputs.path }}'
            Recurse  = [bool]'${{ inputs.recurse }}'
            Severity = '${{ inputs.severity }}'
          }
          
          $results = Invoke-ScriptAnalyzer @params
          
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            if ($errors) {
              Write-Error "PSScriptAnalyzer found $($errors.Count) error(s). Failing build."
              exit 1
            }
            Write-Warning "PSScriptAnalyzer found $($results.Count) issue(s) (no errors)."
          } else {
            Write-Host "✅ No PSScriptAnalyzer issues found."
          }
