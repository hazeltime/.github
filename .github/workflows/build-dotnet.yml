name: Build .NET (Reusable)

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version to use'
        type: string
        default: '9.0.x'
      solution-path:
        description: 'Path to solution or project file'
        type: string
        default: '.'
      run-tests:
        description: 'Whether to run tests'
        type: boolean
        default: true
      run-benchmarks:
        description: 'Whether to run benchmarks'
        type: boolean
        default: false
      publish:
        description: 'Whether to publish artifacts'
        type: boolean
        default: false
      artifact-name:
        description: 'Name for the build artifact'
        type: string
        default: 'build-output'
    secrets:
      NUGET_TOKEN:
        description: 'NuGet feed token (optional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ inputs.dotnet-version }}
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-path }}

      - name: Build
        run: dotnet build ${{ inputs.solution-path }} --no-restore --configuration Release

      - name: Test
        if: ${{ inputs.run-tests }}
        run: dotnet test ${{ inputs.solution-path }} --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: ${{ inputs.run-tests && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 7

      - name: Benchmark
        if: ${{ inputs.run-benchmarks }}
        run: dotnet run --project ${{ inputs.solution-path }} --configuration Release -- --filter '*'

      - name: Publish
        if: ${{ inputs.publish }}
        run: dotnet publish ${{ inputs.solution-path }} --no-build --configuration Release --output ./publish

      - name: Upload build artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish
          retention-days: 14
