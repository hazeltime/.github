name: .NET CI (Reusable)

# Reusable workflow for .NET projects across the hazeltime org.
# Supports GitHub Packages NuGet authentication for consuming Haz3l.* packages.
#
# Usage:
#   jobs:
#     ci:
#       uses: hazeltime/.github/.github/workflows/dotnet-ci.yml@main
#       with:
#         dotnet-version: '10.0.x'
#         solution-path: 'MyProject.sln'
#         test-filter: 'Category!=PostgreSQL'
#       secrets:
#         NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version to install (ignored when global.json is present)'
        type: string
        default: '10.0.x'
      solution-path:
        description: 'Path to the solution or project file to build and test'
        type: string
        default: '.'
      test-filter:
        description: 'dotnet test --filter expression (e.g. Category!=PostgreSQL)'
        type: string
        default: ''
      configuration:
        description: 'Build configuration'
        type: string
        default: 'Release'
      run-tests:
        description: 'Whether to run tests after build'
        type: boolean
        default: true
      upload-results:
        description: 'Whether to upload test result artifacts'
        type: boolean
        default: true
    secrets:
      NUGET_AUTH_TOKEN:
        description: 'GitHub token with read:packages scope for consuming hazeltime NuGet packages'
        required: false

permissions:
  contents: read
  checks: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ hashFiles('global.json') != '' && 'global.json' || '' }}

      - name: Authenticate to GitHub Packages
        if: ${{ secrets.NUGET_AUTH_TOKEN != '' }}
        shell: bash
        run: |
          dotnet nuget add source \
            --username x-access-token \
            --password "${{ secrets.NUGET_AUTH_TOKEN }}" \
            --store-password-in-clear-text \
            --name hazeltime \
            "https://nuget.pkg.github.com/hazeltime/index.json" || true

      - name: Cache NuGet packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ inputs.solution-path }} --verbosity quiet

      - name: Build
        run: dotnet build ${{ inputs.solution-path }} --configuration ${{ inputs.configuration }} --no-restore --verbosity quiet

      - name: Test
        if: ${{ inputs.run-tests }}
        shell: bash
        run: |
          filter='${{ inputs.test-filter }}'
          filter_arg=''
          if [ -n "$filter" ]; then
            filter_arg="--filter \"$filter\""
          fi
          eval dotnet test ${{ inputs.solution-path }} \
            --configuration ${{ inputs.configuration }} \
            --no-build --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./TestResults \
            $filter_arg

      - name: Upload test results
        if: ${{ inputs.run-tests && inputs.upload-results && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-${{ github.sha }}
          path: TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 7
