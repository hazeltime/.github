name: Secret Rotation Check

on:
  schedule:
    - cron: '0 9 1 * *'  # 9am on the 1st of every month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check org secret ages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          THRESHOLD_DAYS=90
          TODAY=$(date +%s)
          ISSUES_TO_CREATE=()
          
          echo "Checking org secrets..."
          SECRETS=$(gh api /orgs/hazeltime/actions/secrets --paginate --jq '.secrets[] | [.name, .updated_at] | @tsv')
          
          while IFS=$'\t' read -r name updated_at; do
            UPDATED=$(date -d "$updated_at" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$updated_at" +%s)
            AGE_DAYS=$(( (TODAY - UPDATED) / 86400 ))
            echo "Secret: $name | Age: ${AGE_DAYS} days"
            
            if [ "$AGE_DAYS" -gt "$THRESHOLD_DAYS" ]; then
              ISSUES_TO_CREATE+=("$name|$AGE_DAYS|$updated_at")
            fi
          done <<< "$SECRETS"
          
          if [ ${#ISSUES_TO_CREATE[@]} -eq 0 ]; then
            echo "✅ All secrets are within the $THRESHOLD_DAYS-day rotation threshold."
            exit 0
          fi
          
          # Build issue body
          BODY="## 🔑 Secret Rotation Required\n\nThe following org secrets have not been rotated in over ${THRESHOLD_DAYS} days and should be updated:\n\n| Secret | Age (days) | Last Updated |\n|--------|-----------|-------------|\n"
          
          for entry in "${ISSUES_TO_CREATE[@]}"; do
            IFS='|' read -r sname sage supdated <<< "$entry"
            BODY+="| \`$sname\` | $sage | $supdated |\n"
          done
          
          BODY+="\n### How to rotate\n1. Generate a new token/credential\n2. Update the secret: \`gh secret set SECRET_NAME --org hazeltime\`\n3. Verify workflows that use this secret still work\n4. Revoke the old token\n\n> This issue was auto-generated by the Secret Rotation Check workflow."
          
          # Check if an open issue already exists
          EXISTING=$(gh issue list --repo hazeltime/.github --state open --label "security,secret-rotation" --json number --jq '.[0].number // empty')
          
          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --repo hazeltime/.github --body "$(printf '%b' "$BODY")"
          else
            echo "Creating new issue"
            gh issue create \
              --repo hazeltime/.github \
              --title "🔑 Action Required: Rotate org secrets ($(date +%Y-%m))" \
              --body "$(printf '%b' "$BODY")" \
              --label "security" \
              || gh issue create \
                --repo hazeltime/.github \
                --title "🔑 Action Required: Rotate org secrets ($(date +%Y-%m))" \
                --body "$(printf '%b' "$BODY")"
          fi
