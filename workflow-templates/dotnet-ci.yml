name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]
  workflow_dispatch:

jobs:
  ci:
    uses: hazeltime/.github/.github/workflows/dotnet-ci.yml@main
    with:
      dotnet-version: '10.0.x'
      solution-path: '.'
      test-filter: ''
      configuration: 'Release'
    secrets:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
